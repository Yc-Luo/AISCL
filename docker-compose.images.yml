# Low-memory server deployment.
#
# This file intentionally does not contain backend/frontend build steps. Build
# these images on GitHub Actions or a workstation, then let the server pull and
# run them.

services:
  mongodb:
    image: mongo:7.0
    container_name: AISCL-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - AISCL-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: AISCL-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - AISCL-network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: AISCL-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    networks:
      - AISCL-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  qdrant:
    image: qdrant/qdrant:latest
    container_name: AISCL-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - AISCL-network

  backend:
    image: ghcr.io/yc-luo/aiscl-backend:${AISCL_IMAGE_TAG:-latest}
    container_name: AISCL-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: production
      DEBUG: "false"
      LOG_LEVEL: INFO
      HOME: /app
      MONGODB_URI: mongodb://mongodb:27017/AISCL
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      QDRANT_URL: http://qdrant:6333
    networks:
      - AISCL-network
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ghcr.io/yc-luo/aiscl-frontend:${AISCL_IMAGE_TAG:-latest}
    container_name: AISCL-frontend
    restart: unless-stopped
    networks:
      - AISCL-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: AISCL-nginx
    restart: unless-stopped
    ports:
      - "${AISCL_HTTP_BIND:-127.0.0.1:8080}:80"
    volumes:
      - ./nginx/nginx.server.conf:/etc/nginx/nginx.conf:ro
    networks:
      - AISCL-network
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongodb_data:
  mongodb_config:
  redis_data:
  minio_data:
  qdrant_data:

networks:
  AISCL-network:
    driver: bridge
